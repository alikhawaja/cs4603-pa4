# Bonus A — CI/CD pipeline (.github/workflows/deploy.yml)
#
# TODO: Implement a lint -> test -> deploy workflow.
#   - lint:   ruff check on agent/ and client/
#   - test:   a smoke test that imports and compiles the graph
#   - deploy: ONLY on push to main; log the model, register a new UC version,
#             and update the serving endpoint. Use GitHub Secrets for
#             DATABRICKS_HOST / DATABRICKS_TOKEN. Add a workflow_dispatch trigger.

name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check agent/ client/

      - name: Smoke test
        run: uv run pytest -q tests/test_smoke.py

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: latest

      - name: Sync dependencies
        run: uv sync --extra dev

      - name: Deploy
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          UC_CATALOG: ${{ vars.UC_CATALOG || 'main' }}
          UC_SCHEMA: ${{ vars.UC_SCHEMA || 'default' }}
          SERVING_ENDPOINT_NAME: ${{ vars.SERVING_ENDPOINT_NAME || 'pa4-document-analyst' }}
          SECRET_SCOPE: ${{ vars.SECRET_SCOPE || 'cs4603-deploy' }}
          VECTOR_SEARCH_ENDPOINT: ${{ vars.VECTOR_SEARCH_ENDPOINT }}
          VECTOR_SEARCH_INDEX: ${{ vars.VECTOR_SEARCH_INDEX }}
          EMBEDDINGS_ENDPOINT: ${{ vars.EMBEDDINGS_ENDPOINT || 'databricks-gte-large-en' }}
        run: uv run python deployment/deploy.py
